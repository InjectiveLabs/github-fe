name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch PR diff
        id: pr_diff
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request

            const diff = await github.request(
              'GET /repos/{owner}/{repo}/pulls/{pull_number}',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                mediaType: { format: "diff" }
              }
            )

            core.setOutput("diff", diff.data)

      - name: Run Codex Review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_FE_API_KEY }}
          model: gpt-5.3-codex
          effort: high
          prompt: |
            You are reviewing a GitHub Pull Request.

            Review ONLY the code changes in the diff below.

            Look for:
            - bugs
            - security issues
            - performance problems
            - edge cases
            - maintainability issues

            If no issues are found respond EXACTLY with:
            LGTM

            Pull Request Title:
            ${{ github.event.pull_request.title }}

            Pull Request Description:
            ${{ github.event.pull_request.body }}

            -------- DIFF --------
            ${{ steps.pr_diff.outputs.diff }}

      - name: Post Codex review comment
        uses: actions/github-script@v7
        env:
          MESSAGE: ${{ steps.codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const message =
              process.env.MESSAGE && process.env.MESSAGE.trim() !== ""
                ? process.env.MESSAGE
                : "🟢 Codex reviewed the PR and found no issues."

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: message
            })
