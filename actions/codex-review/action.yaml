name: Codex PR Review
description: 'Run Codex AI review on a pull request and post findings as a comment'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  openai-api-key:
    description: 'OpenAI API key for Codex'
    required: true
  pr-diff:
    description: 'The pull request diff content'
    required: true
  pr-title:
    description: 'The pull request title'
    required: true
  pr-body:
    description: 'The pull request body/description'
    required: false
    default: ''
  pr-number:
    description: 'The pull request number'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run Codex Review
      id: codex
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.openai-api-key }}
        model: gpt-5.3-codex
        effort: high
        prompt: |
          You are reviewing a GitHub Pull Request.

          Review ONLY the code changes in the diff below.

          Look for:
          - bugs
          - security issues
          - performance problems
          - edge cases
          - maintainability issues

          CRITICAL file reference formatting rule:
          When referencing files, use markdown links where the DISPLAY TEXT inside the square brackets must be the full absolute path, NOT just the filename.
          The display text and the href must be identical — both the full path.

          CORRECT — display text is the full path:
            [/home/runner/work/injective-fe-server/injective-fe-server/apps/bff-api/src/utils/ip.ts:25](/home/runner/work/injective-fe-server/injective-fe-server/apps/bff-api/src/utils/ip.ts:25)

          WRONG — display text is only the filename:
            [ip.ts:25](/home/runner/work/injective-fe-server/injective-fe-server/apps/bff-api/src/utils/ip.ts:25)

          The text shown to the reader in [ ] must always be the full path starting from /home/runner/work/. Never shorten it to just the filename.

          If no issues are found respond EXACTLY with:
          LGTM

          Pull Request Title:
          ${{ inputs.pr-title }}

          Pull Request Description:
          ${{ inputs.pr-body }}

          -------- DIFF --------
          ${{ inputs.pr-diff }}

    - name: Post Codex review comment
      uses: actions/github-script@v7
      env:
        MESSAGE: ${{ steps.codex.outputs.final-message }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const message =
            process.env.MESSAGE && process.env.MESSAGE.trim() !== ""
              ? process.env.MESSAGE
              : "🟢 Codex reviewed the PR and found no issues."

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: ${{ inputs.pr-number }},
            body: message
          })
