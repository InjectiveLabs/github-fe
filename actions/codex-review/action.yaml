name: Codex PR Review
description: 'Run Codex AI review on a pull request and post findings as a comment'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  openai-api-key:
    description: 'OpenAI API key for Codex'
    required: true
  pr-diff:
    description: 'The pull request diff content'
    required: true
  pr-title:
    description: 'The pull request title'
    required: true
  pr-body:
    description: 'The pull request body/description'
    required: false
    default: ''
  pr-number:
    description: 'The pull request number'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run Codex Review
      id: codex
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.openai-api-key }}
        model: gpt-5.3-codex
        effort: high
        prompt: |
          You are reviewing a GitHub Pull Request.

          Review ONLY the code changes in the diff below.

          Look for:
          - bugs
          - security issues
          - performance problems
          - edge cases
          - maintainability issues

          CRITICAL file reference formatting rule:
          When referencing files, you MUST use markdown links with the repository name prepended to the file path from the diff.
          The repository name is: ${{ github.event.repository.name }}
          File paths in the diff look like "apps/chain-stream/src/app.ts" — prepend the repo name to get the display format.
          Both the link text and href MUST be identical and use this format.

          CORRECT format examples:
            [${{ github.event.repository.name }}/apps/chain-stream/src/app.ts:56](${{ github.event.repository.name }}/apps/chain-stream/src/app.ts:56)
            [${{ github.event.repository.name }}/src/utils/ip.ts:25](${{ github.event.repository.name }}/src/utils/ip.ts:25)

          WRONG — filename only (NEVER do this):
            [app.ts](app.ts)
            [ip.ts:25](ip.ts:25)

          WRONG — absolute runner path (NEVER do this):
            [/home/runner/work/repo/repo/src/app.ts](/home/runner/work/repo/repo/src/app.ts)

          Every file reference MUST start with "${{ github.event.repository.name }}/" followed by the path from the diff.

          If no issues are found respond EXACTLY with:
          LGTM

          Pull Request Title:
          ${{ inputs.pr-title }}

          Pull Request Description:
          ${{ inputs.pr-body }}

          -------- DIFF --------
          ${{ inputs.pr-diff }}

    - name: Post Codex review comment
      uses: actions/github-script@v7
      env:
        MESSAGE: ${{ steps.codex.outputs.final-message }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const prefix = "**Verify each finding against the current code and only fix it if needed.**\n\n"
          let raw = process.env.MESSAGE || ""

          if (!raw.trim()) {
            core.setFailed('Codex returned empty output — review may not have completed successfully.')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr-number }},
              body: '⚠️ Codex review returned empty output. The review may not have completed successfully — please check the workflow logs.'
            })

            return
          }

          // Clean up absolute runner paths: /home/runner/work/{dir}/{repo}/path → {repo}/path
          raw = raw.replace(/\/home\/runner\/work\/[^\/]+\//g, '')

          // If a markdown link's display text is just a filename but the href has the full path,
          // replace the display text with the href so readers see the full path
          raw = raw.replace(/\[([^\]\/\n]+\.[a-z]{1,4}(?::\d+)?)\]\(([^)]*\/[^)]+)\)/g, (m, text, href) => `[${href}](${href})`)

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: ${{ inputs.pr-number }},
            body: prefix + raw
          })
