name: 'Devnet Release'
description: 'Check out the caller repository and verify that pnpm generate completes successfully'

inputs:
  source_dir:
    description: 'Deprecated compatibility input. Ignored.'
    required: false
  ssh_host:
    description: 'Deprecated compatibility input. Ignored.'
    required: false
  ssh_user:
    description: 'Deprecated compatibility input. Ignored.'
    required: false
  ssh_key:
    description: 'Deprecated compatibility input. Ignored.'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        ref: ${{ github.sha }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: useblacksmith/setup-node@v5
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile

    - name: Verify generate build
      shell: bash
      run: pnpm generate

    - name: Verify build output
      shell: bash
      run: |
        test -f .output/public/index.html || { echo "::error::.output/public/index.html missing - build failed"; exit 1; }
        test -d .output/public/_nuxt || { echo "::error::.output/public/_nuxt/ missing - build failed"; exit 1; }
        echo "Build verified: .output/public/index.html and .output/public/_nuxt/ exist"
