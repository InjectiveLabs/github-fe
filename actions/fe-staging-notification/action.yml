name: "Deployment Notification"
description: "Send Slack notifications for deployments"

inputs:
  repo:
    description: "Repository name (e.g., Mito, Injective)"
    required: true
  network:
    description: "Network name for the deployment"
    required: true
  branch:
    description: "Branch name being deployed (optional - auto-detected from workflow_dispatch input)"
    required: false
  description:
    description: "Description of the deployment"
    required: false
    default: "Frontend deployment"
  slack-user-token:
    description: "Slack user token for reading messages"
    required: true
  slack-bot-token:
    description: "Slack bot token for sending messages"
    required: true
  staging_url:
    description: "URL of the staging deployment"
    required: true
  slack-channel:
    description: "Slack channel name for notifications"
    required: false
    default: "frontend-staging"
  linear-api-key:
    description: "Linear API key for posting comments on tickets"
    required: false
  commit-messages:
    description: "Newline-separated commit messages (for workflow_dispatch where event payload has no commits)"
    required: false
  pr-title:
    description: "Pull request title (for extracting Linear tickets)"
    required: false

outputs:
  branch_name:
    description: "The branch name that was deployed"
  message_found:
    description: "Whether an existing Slack message was found"
  existing_message_ts:
    description: "Timestamp of existing Slack message if found"
  existing_channel_id:
    description: "Channel ID of existing Slack message if found"
  channel_name:
    description: "Slack channel name used"
  message_ts:
    description: "Timestamp of the Slack message (either existing or newly created)"
  linear_tickets:
    description: "Comma-separated list of Linear ticket IDs found"
  linear_links:
    description: "Comma-separated list of Linear ticket URLs"

runs:
  using: "node24"
  main: "dist/index.js"
